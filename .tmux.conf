# For vim in tmux
set -g default-terminal "screen-256color";

# Large scrollback buffer size
set -g history-limit 100000;

# Change prefix
unbind C-b;
set -g prefix C-s;

# Enable vim mode
setw -g mode-keys vi;
set -g mouse on;

# start window index at 1 instead of zero.
set -g base-index 1;

# for vim oscyank plugin
set -s set-clipboard on

# split window like vim
# vim's defination of a horizontal/vertical split is revised from tumx's
bind s split-window -h -c "#{pane_current_path}";
bind v split-window -v -c "#{pane_current_path}";
bind c new-window -c "#{pane_current_path}";
# move arount panes wiht hjkl, as one would in vim after C-w
bind h select-pane -L;
bind j select-pane -D;
bind k select-pane -U;
bind l select-pane -R;
bind i last-window
# Smart pane switching with awareness of vim splits
# See: https://github.com/christoomey/vim-tmux-navigator
is_vim='echo "#{pane_current_command}" | grep -iqE "(^|\/)g?(view|n?vim?x?)(diff)?$"';
bind -n C-h if-shell "$is_vim" "send-keys C-h" "select-pane -L";
bind -n C-j if-shell "$is_vim" "send-keys C-j" "select-pane -D";
bind -n C-k if-shell "$is_vim" "send-keys C-k" "select-pane -U";
bind -n C-l if-shell "$is_vim" "send-keys C-l" "select-pane -R";
bind -n C-\\ if-shell "$is_vim" "send-keys C-\\\\" "select-pane -l";

# resize panes like vim
# feel free to change the "1" to however many lines you want to resize by,
# only one at a time can be slow
bind < resize-pane -L 10;
bind > resize-pane -R 10;
bind - resize-pane -D 10;
bind + resize-pane -U 10;

# bind : to command-prompt like vim
# this is the default in tmux already
bind : command-prompt;

set-option -g status on;
set-option -g status-interval 2;
set-option -g status-justify "centre";
set-option -g status-left-length 60;
set-option -g status-right-length 90;
set-option -g status-bg colour233;
set-option -g status-fg colour233;
set-option -g window-status-format " #I #W ";
set-option -g window-status-current-format " #I #W ";

setenv -g VERSION_COMPARE ' \
           CURRENT_VERSION=#{version} \
           && [ $(printf "%s\\n" $CURRENT_VERSION $VERSION_START_FROM | sort -Vr | head -n1) = $CURRENT_VERSION ] \
           && echo "TRUE" || echo "FALSE"';

# use -style config for version start from 2.9
if-shell ' \
        VERSION_START_FROM="2.9"; \
        [ $(eval $VERSION_COMPARE) = "TRUE" ] \
        ' \
            {
                set-option -g window-status-current-style bg=colour240,fg=colour255;
                set-option -g window-status-style bg=colour233,fg=colour8;
            } {
                set-option -g window-status-current-bg colour240;
                set-option -g window-status-current-fg colour255;
                set-option -g window-status-current-attr default;
                set-option -g window-status-bg colour233;
                set-option -g window-status-fg colour8;
            };

# pane board setting for version start from 2.3
if-shell ' \
        VERSION_START_FROM="2.3"; \
        [ $(eval $VERSION_COMPARE) = "TRUE" ] \
        ' \
            {
                set-option -g pane-border-status top;
                set-option -g pane-border-lines heavy;
                set-option -g pane-border-style fg=colour236;
                set-option -g pane-active-border-style fg=colour51,bold;
                set-option -g pane-border-format '#{?pane_active,#[bold,fg=colour231,bg=colour39] ACTIVE #[default] ,#[fg=colour242] idle #[default] }#P: #{pane_title} | #{pane_current_command} ';
                set-option -g window-style bg=colour234;
                set-option -g window-active-style bg=colour238;
            };

# add shortcut for search window and session with peco
# use popup for version start from 3.2
if-shell ' \
        VERSION_START_FROM="3.9"; \
        [ $(eval $VERSION_COMPARE) = "TRUE" ] \
        ' {
            bind f display-popup -E "tmux lsw | peco --initial-index $(tmux lsw | awk \'/active.$/ {print NR-1}') | cut -d':' -f 1 | tr -d '\n' | xargs -0 tmux select-window -t";
            bind B display-popup -E "tmux ls | peco --initial-index $(tmux ls | awk \"/^$(tmux display-message -p '#{session_name}'):/ {print NR-1}\") | cut -d':' -f 1 | tr -d '\n' | xargs -0 tmux switch-client -t";
        } {
            bind f split-window "tmux lsw | peco --initial-index $(tmux lsw | awk \'/active.$/ {print NR-1}') | cut -d':' -f 1 | tr -d '\n' | xargs -0 tmux select-window -t";
            bind B split-window "tmux ls | peco --initial-index $(tmux ls | awk \"/^$(tmux display-message -p '#{session_name}'):/ {print NR-1}\") | cut -d':' -f 1 | tr -d '\n' | xargs -0 tmux switch-client -t";
        };


# poweline
# mkdir -p .tmux  && git clone https://github.com/erikw/tmux-powerline.git .tmux/tmux-powerline
if-shell 'test -f ~/.tmux/tmux-powerline/powerline.sh' \
        {
            set-option -g status-left '#(~/.tmux/tmux-powerline/powerline.sh left)';
            set-option -g status-right '#(~/.tmux/tmux-powerline/powerline.sh right)';
        } {
            set-option -g status-left '#[bg=colour240, fg=colour255]\[prefix: c-s\]';
            set-option -g status-right '#[bg=colour240, fg=colour255]\[session: #S\]';
        };
